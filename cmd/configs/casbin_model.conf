[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# 1. 核心修复：如果主体角色 (r.sub) 是 super_admin，直接允许，忽略 obj 和 act
# 2. 常规逻辑：支持角色继承(g)，支持 RESTful 路径匹配(keyMatch2)
m = r.sub == "super_admin" || (g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && (p.act == "*" || r.act == p.act))
