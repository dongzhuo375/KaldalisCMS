[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# 核心逻辑：
# 1. g(r.sub, p.sub): 检查用户角色是否匹配 (比如当前用户是 admin，策略里写的是 admin)
# 2. keyMatch2(r.obj, p.obj): 路径匹配 (支持 /api/v1/posts/:id)
# 3. p.act == "*" 时允许任意方法，兼容 super_admin 全量权限模板
m = g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && (p.act == "*" || r.act == p.act)
